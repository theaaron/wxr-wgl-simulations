<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR/WebGL Simulations</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="container">
        <fieldset id="structure-select">
            <legend>Structure</legend>
            <label><input type="radio" name="structure" value="whole" checked> Whole</label>
            <label><input type="radio" name="structure" value="atria"> Atria</label>
            <label><input type="radio" name="structure" value="ventricle"> Ventricle</label>
        </fieldset>

        <button id="vr-button" disabled>Enter VR</button>

        <div class="controls">
            <label for="voxel-scale">Voxel Size: <span id="scale-value">5.0</span>x</label>
            <input type="range" id="voxel-scale" min="0.5" max="10.0" step="0.5" value="5.0">
        </div>

        <a href="ar-test.html" class="nav-link">AR Test</a>
    </div>
    <div id="status">Initializing…</div>
    <script type="module" src="new-depth-peel.js"></script>
</body>

</html>
