<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebXR/WebGL Simulations</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="container">
        <h1>WebXR/WebGL Simulations</h1>

        <div class="selector">
            <div class="selector-row">
                <span class="selector-label">Structure</span>
                <div class="btn-group">
                    <button class="sel-btn active" data-axis="structure" data-value="atria">Atria</button>
                    <button class="sel-btn" data-axis="structure" data-value="ventricle">Ventricle</button>
                </div>
            </div>
            <div class="selector-row">
                <span class="selector-label">Renderer</span>
                <div class="btn-group">
                    <button class="sel-btn active" data-axis="renderer" data-value="surface">Surface</button>
                    <button class="sel-btn" data-axis="renderer" data-value="voxel">Voxel</button>
                </div>
            </div>
            <div class="selector-row">
                <span class="selector-label">Model</span>
                <div class="btn-group">
                    <button class="sel-btn active" data-axis="model" data-value="mm">Minimal</button>
                    <button class="sel-btn" disabled>TBD</button>
                </div>
            </div>
        </div>

        <button id="launch-btn">Launch</button>
        <p id="combo-status"></p>

        <div class="nav-group">
            <a href="ar-test.html" class="nav-btn">AR Test</a>
        </div>
    </div>

    <script>
        const ROUTES = {
            'atria-surface-mm':    'surface-atria-mm.html',
            'atria-voxel-mm':      'voxelizer-atia-mm.html',
        };

        const LABELS = {
            structure: { atria: 'Atria',   ventricle: 'Ventricle' },
            renderer:  { surface: 'Surface', voxel: 'Voxel' },
            model:     { mm: 'Minimal Model', tp: 'Ten Tusscher', ord: 'ORd' },
        };

        const sel = { structure: 'atria', renderer: 'surface', model: 'mm' };

        function key() { return `${sel.structure}-${sel.renderer}-${sel.model}`; }

        function update() {
            const url  = ROUTES[key()];
            const btn  = document.getElementById('launch-btn');
            const info = document.getElementById('combo-status');
            info.textContent = [
                LABELS.structure[sel.structure],
                LABELS.renderer[sel.renderer],
                LABELS.model[sel.model],
            ].join(' · ');
            btn.disabled    = !url;
            btn.textContent = url ? 'Launch' : 'Not yet implemented';
        }

        document.querySelectorAll('.sel-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const { axis, value } = btn.dataset;
                sel[axis] = value;
                document.querySelectorAll(`.sel-btn[data-axis="${axis}"]`)
                    .forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                update();
            });
        });

        document.getElementById('launch-btn').addEventListener('click', () => {
            const url = ROUTES[key()];
            if (url) window.location.href = url;
        });

        update();
    </script>
</body>

</html>
